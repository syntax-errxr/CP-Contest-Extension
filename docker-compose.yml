version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: cp_extension_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cp_extension_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=file:/app/test.db
      - REDIS_URL=redis://redis:6379/0
      - ENV=development
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
